<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>Green API Test</title>
		<link rel="stylesheet" href="style.css" />
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 20px;
				background: #f4f4f4;
			}
			h2 {
				text-align: center;
			}
			.container {
				max-width: 500px;
				margin: auto;
				background: #fff;
				padding: 20px;
				border-radius: 8px;
				box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			}
			input,
			textarea,
			button {
				width: 100%;
				margin: 5px 0;
				padding: 10px;
				font-size: 14px;
				border-radius: 4px;
				border: 1px solid #ccc;
			}
			.buttons button {
				width: 48%;
				margin-right: 2%;
				display: inline-block;
			}
			.buttons button:last-child {
				margin-right: 0;
			}
			textarea {
				height: 150px;
				resize: none;
			}
		</style>
	</head>
	<body>
		<h2>Green API Test</h2>

		<div class="container">
			<input id="idInstance" placeholder="idInstance" />
			<input id="apiToken" placeholder="ApiTokenInstance" />

			<div class="buttons">
				<button id="btnGetSettings">getSettings</button>
				<button id="btnGetState">getStateInstance</button>
			</div>

			<input id="phone" placeholder="Номер (7700...)" />
			<input id="message" placeholder="Сообщение" />
			<input id="fileUrl" placeholder="URL файла" />

			<div class="buttons">
				<button id="btnSendMessage">sendMessage</button>
				<button id="btnSendFile">sendFileByUrl</button>
			</div>

			<textarea id="response" readonly></textarea>
		</div>

		<script>
			// Получаем данные из input
			function getData() {
				const idInstance = document.getElementById('idInstance').value
				const apiToken = document.getElementById('apiToken').value
				return { idInstance, apiToken }
			}

			// Выводим ответ в textarea
			function setResponse(data) {
				document.getElementById('response').value = JSON.stringify(
					data,
					null,
					2,
				)
			}

			// getSettings
			async function getSettings() {
				const { idInstance, apiToken } = getData()
				try {
					const res = await fetch(
						`https://api.green-api.com/waInstance${idInstance}/getSettings/${apiToken}`,
					)
					const data = await res.json()
					setResponse(data)
				} catch (error) {
					setResponse(error)
				}
			}

			// getStateInstance
			async function getState() {
				const { idInstance, apiToken } = getData()
				try {
					const res = await fetch(
						`https://api.green-api.com/waInstance${idInstance}/getStateInstance/${apiToken}`,
					)
					const data = await res.json()
					setResponse(data)
				} catch (error) {
					setResponse(error)
				}
			}

			// sendMessage
			async function sendMessage() {
				const { idInstance, apiToken } = getData()
				const phone = document.getElementById('phone').value
				const message = document.getElementById('message').value
				try {
					const res = await fetch(
						`https://api.green-api.com/waInstance${idInstance}/sendMessage/${apiToken}`,
						{
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify({
								chatId: `${phone}@c.us`,
								message: message,
							}),
						},
					)
					const data = await res.json()
					setResponse(data)
				} catch (error) {
					setResponse(error)
				}
			}

			// sendFileByUrl
			async function sendFile() {
				const { idInstance, apiToken } = getData()
				const phone = document.getElementById('phone').value
				const fileUrl = document.getElementById('fileUrl').value
				try {
					const res = await fetch(
						`https://api.green-api.com/waInstance${idInstance}/sendFileByUrl/${apiToken}`,
						{
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify({
								chatId: `${phone}@c.us`,
								urlFile: fileUrl,
								fileName: 'file',
							}),
						},
					)
					const data = await res.json()
					setResponse(data)
				} catch (error) {
					setResponse(error)
				}
			}

			// Привязываем кнопки к функциям
			document
				.getElementById('btnGetSettings')
				.addEventListener('click', getSettings)
			document.getElementById('btnGetState').addEventListener('click', getState)
			document
				.getElementById('btnSendMessage')
				.addEventListener('click', sendMessage)
			document.getElementById('btnSendFile').addEventListener('click', sendFile)
		</script>
	</body>
</html>
